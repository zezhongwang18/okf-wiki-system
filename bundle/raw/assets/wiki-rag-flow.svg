<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420">
  <rect width="960" height="420" fill="#f8fafc"/>
  <style>
    text { font-family: Arial, sans-serif; fill: #111827; }
    .box { fill: #ffffff; stroke: #2563eb; stroke-width: 3; rx: 12; }
    .label { font-size: 24px; font-weight: 700; }
    .small { font-size: 16px; fill: #374151; }
    .arrow { stroke: #111827; stroke-width: 3; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
    </marker>
  </defs>
  <rect class="box" x="40" y="130" width="180" height="110"/>
  <text class="label" x="130" y="175" text-anchor="middle">Raw Sources</text>
  <text class="small" x="130" y="205" text-anchor="middle">PDF, Docs, Notes</text>
  <line class="arrow" x1="230" y1="185" x2="320" y2="185"/>
  <rect class="box" x="330" y="100" width="220" height="170"/>
  <text class="label" x="440" y="155" text-anchor="middle">OKF Bundle</text>
  <text class="small" x="440" y="190" text-anchor="middle">Concepts + Sources</text>
  <text class="small" x="440" y="214" text-anchor="middle">Assets + Questions</text>
  <text class="small" x="440" y="238" text-anchor="middle">Directory Indexes</text>
  <line class="arrow" x1="560" y1="185" x2="650" y2="185"/>
  <rect class="box" x="660" y="130" width="130" height="110"/>
  <text class="label" x="725" y="175" text-anchor="middle">MCP Tools</text>
  <text class="small" x="725" y="205" text-anchor="middle">Search + Read</text>
  <line class="arrow" x1="800" y1="185" x2="850" y2="185"/>
  <rect class="box" x="850" y="130" width="80" height="110"/>
  <text class="label" x="890" y="175" text-anchor="middle">Agent</text>
  <text class="small" x="890" y="205" text-anchor="middle">Answer</text>
</svg>
